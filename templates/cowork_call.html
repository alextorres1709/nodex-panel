{% extends "base.html" %}
{% block title %}Videollamada{% endblock %}
{% block page_title %}Videollamada{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Videollamada</h1>
        <p class="page-subtitle">Sala: {{ room }}</p>
    </div>
    <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="copyLink()">Copiar enlace</button>
        <button class="btn btn-danger btn-sm" onclick="disconnectVoice()">Desconectar</button>
    </div>
</div>

<div id="jitsi-container" style="width:100%;height:calc(100vh - 180px);border-radius:var(--radius-md);overflow:hidden;">
</div>
{% endblock %}

{% block scripts %}
<script src="https://meet.ffmuc.net/external_api.js"></script>
<script>
    var JITSI_DOMAIN = 'meet.ffmuc.net';
    var api = new JitsiMeetExternalAPI(JITSI_DOMAIN, {
        roomName: '{{ room }}',
        parentNode: document.getElementById('jitsi-container'),
        width: '100%',
        height: '100%',
        userInfo: {
            displayName: '{{ current_user.name }}',
        },
        configOverwrite: {
            startWithAudioMuted: false,
            startWithVideoMuted: false,
            disableDeepLinking: true,
            prejoinConfig: { enabled: false },
            disableModeratorIndicator: true,
            enableLobbyChat: false,
            hideLobbyButton: true,
            requireDisplayName: false,
            enableInsecureRoomNameWarning: false,
            notifications: [],
        },
        interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_WATERMARK_FOR_GUESTS: false,
            DEFAULT_BACKGROUND: '#0a0a0a',
            DISABLE_JOIN_LEAVE_NOTIFICATIONS: true,
            HIDE_INVITE_MORE_HEADER: true,
        },
    });

    api.on('readyToClose', function () {
        disconnectVoice();
    });

    function disconnectVoice() {
        fetch('/cowork/voice/leave', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        }).then(function () {
            window.location.href = '{{ url_for("cowork.index") }}';
        });
    }

    function copyLink() {
        navigator.clipboard.writeText('https://' + JITSI_DOMAIN + '/{{ room }}').then(function () {
            var btn = event.target;
            var orig = btn.textContent;
            btn.textContent = 'Copiado';
            setTimeout(function () { btn.textContent = orig; }, 2000);
        });
    }
</script>
{% endblock %}
