<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodexAI — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="NodexAI" style="width:36px;height:36px"></div>
            <h1>NodexAI</h1>
            <p>Panel interno de gestion</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <div class="flash-message flash-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="remember-row">
                    <label class="remember-label">
                        <input type="checkbox" name="remember" value="1" checked>
                        <span>Recordar sesion (30 dias)</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar sesion</button>
            </form>
        </div>
    </div>
</body>
</html>
